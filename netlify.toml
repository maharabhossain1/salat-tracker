# Netlify config for Next.js 16 (App Router) + Drizzle migrations on every build.
[build]
  # --prod=false installs devDependencies (drizzle-kit) without setting NODE_ENV=development,
  # so next build can run as production correctly.
  command = "pnpm install --prod=false && pnpm db:migrate && pnpm build"

[build.environment]
  NODE_VERSION = "24"

# Official Next.js runtime — handles SSR, server actions, and middleware (proxy.ts).
[[plugins]]
  package = "@netlify/plugin-nextjs"
